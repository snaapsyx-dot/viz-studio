<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leywin — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <header class="admin-header">
    <a href="/" class="admin-logo">Leywin <small>Admin Panel</small></a>
    <div class="admin-actions">
      <button class="btn btn-outline" onclick="location.href='/'">View Site</button>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="admin-body">
    <div class="status-msg" id="statusMsg"></div>

    <div class="tabs">
      <button class="tab active" data-tab="projects" onclick="switchTab('projects')">Projects</button>
      <button class="tab" data-tab="clients" onclick="switchTab('clients')">Clients</button>
    </div>

    <!-- PROJECTS TAB -->
    <div id="tab-projects">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-family:var(--font-d);font-size:18px;">Projects</h2>
        <button class="btn btn-primary" onclick="showProjectForm()">+ Add Project</button>
      </div>

      <div id="projectsList"></div>
      <div id="projectForm" style="display:none"></div>
    </div>

    <!-- CLIENTS TAB -->
    <div id="tab-clients" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-family:var(--font-d);font-size:18px;">Clients</h2>
        <button class="btn btn-primary" onclick="showClientForm()">+ Add Client</button>
      </div>

      <div id="clientsList"></div>
      <div id="clientForm" style="display:none"></div>
    </div>
    <!-- Settings tab removed -->
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
